<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>교육용 게임 점수판</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="scoreboard" aria-labelledby="page-title">
        <div class="heading-row">
          <div>
            <p class="eyebrow">온라인 리더보드</p>
            <h1 id="page-title">교육용 게임 점수판</h1>
          </div>
          <div class="heading-actions">
            <a
              class="secondary-link"
              href="https://github.com/cosemoon/drone-simulator-donggame/archive/refs/heads/main.zip"
              target="_blank"
              rel="noopener noreferrer"
            >
              시뮬레이터 다운로드
            </a>
            <button id="refresh-button" type="button">새로고침</button>
          </div>
        </div>

        <div class="toolbar" aria-label="점수판 필터">
          <label>
            학교 필터
            <input
              id="school-filter"
              type="search"
              maxlength="30"
              placeholder="예: 하늘초"
              autocomplete="off"
            />
          </label>
          <p id="status-message" class="status-message" role="status">
            점수판을 불러오는 중...
          </p>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th scope="col">순위</th>
                <th scope="col">닉네임</th>
                <th scope="col">학교</th>
                <th scope="col">최고 점수</th>
                <th scope="col">갱신 시간</th>
              </tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
          </table>
        </div>
      </section>

      <section class="download-card" aria-labelledby="download-title">
        <div>
          <p class="eyebrow">다운로드 전용</p>
          <h2 id="download-title">드론 시뮬레이션 프로그램</h2>
          <p>
            Cloudflare에는 온라인 점수판과 API만 배포합니다. 시뮬레이터는
            GitHub에서 내려받아 로컬 컴퓨터에서 실행하세요.
          </p>
        </div>
        <div class="download-actions">
          <a
            class="primary-link"
            href="https://github.com/cosemoon/drone-simulator-donggame/archive/refs/heads/main.zip"
            target="_blank"
            rel="noopener noreferrer"
          >
            ZIP 다운로드
          </a>
          <a
            class="ghost-link"
            href="https://github.com/cosemoon/drone-simulator-donggame"
            target="_blank"
            rel="noopener noreferrer"
          >
            GitHub 보기
          </a>
        </div>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
